# Install containerd


- name: Download docker gpg key
  become: true
  become_user: root
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
  tags: [kubernetes, containerd]

- name: Set permissions on docker gpg key
  become: true
  become_user: root
  file:
    path: /etc/apt/keyrings/docker.asc
    mode: 0644
  tags: [kubernetes, containerd]

- name: Delete old docker repository file
  become: true
  become_user: root
  file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  tags: [kubernetes, containerd]

- name: Add the containerd repository
  become: true
  become_user: root
  apt_repository:
    filename: docker
    repo: deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    update_cache: yes
  tags: [kubernetes, containerd]

- name: Install containerd
  become: true
  become_user: root
  apt:
    name: containerd.io
    state: present
    update_cache: yes
  tags: [kubernetes, containerd]

- name: Parse containerd file to config dir
  become: true
  become_user: root
  shell: containerd config default > /etc/containerd/config.toml
  args:
    executable: /bin/bash
  tags: [kubernetes, containerd]


- name: Replace SystemdCGroup in containerd config
  become: true
  become_user: root
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  tags: [kubernetes, containerd]

- name: Restart containerd
  become: true
  become_user: root
  service:
    name: containerd
    state: restarted
  tags: [kubernetes, containerd]

- name: Ensure containerd is started on boot
  become: true
  become_user: root
  service:
    name: containerd
    enabled: yes
  tags: [kubernetes, containerd]
