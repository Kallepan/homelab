version: "3"
services:
  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    restart: unless-stopped
    volumes:
      - ./downloads:/downloads
    labels:
      - traefik.enable=true
      - traefik.http.routers.metube.entrypoints=websecure
      - traefik.http.routers.metube.rule=Host(`metube.srv-docker-0.server.home`)
      - traefik.http.routers.metube.tls=true
    networks:
      - traefik_default

networks:
  traefik_default:
    external: true