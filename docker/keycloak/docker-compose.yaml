---
version: "3"

services:
  keycloak:
      container_name: keycloak
      image: quay.io/keycloak/keycloak:latest
      restart: always
      labels:
        - traefik.enable=true
        - traefik.http.routers.keycloak.entrypoints=websecure
        - traefik.http.routers.keycloak.rule=Host(`keycloak.srv-docker-0.server.home`)
        - traefik.http.routers.keycloak.tls=true
      environment:
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
        KC_DB_USER: keycloak
        KC_DB_SCHEMA: public
        KC_DB_PASSWORD: ${KC_DB_PASSWORD}
        KC_HOSTNAME: keycloak.srv-docker-0.server.home # see above traefik.http.routers.keycloak.rule
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
        KC_PROXY: edge
      networks:
        - traefik_default
      command: start

networks:
  traefik_default:
    external: true
