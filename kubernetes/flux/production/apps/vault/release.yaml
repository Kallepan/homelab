apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      version: "1.15.x"
      sourceRef:
        kind: HelmRepository
        name: vault
        namespace: vault
      interval: 12h
  values:
    global:
      dataStorage:
        enabled: true
        size: 10Gi
        accessMode: ReadWriteOnce
        mountPath: /vault/data
        storageClass: longhorn
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: vault.srv-k8s.server.io
            paths: []
        tls:
          - secretName: vault-tls
            hosts:
              - vault.srv-k8s.server.io
        