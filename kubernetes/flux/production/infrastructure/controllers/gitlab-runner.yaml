---
apiVersion: v1
kind: Namespace
metadata:
  name: gitlab-runner
  labels:
    toolkit.fluxcd.io/tenant: sre-team
    gitlab/runner: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  interval: 30m
  url: https://charts.gitlab.io/
  timeout: 3m
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  interval: 5m
  chart:
    spec:
      chart: gitlab-runner
      version: "0.x.x"
      sourceRef:
        kind: HelmRepository
        name: gitlab-runner
        namespace: gitlab-runner
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    gitlabUrl: https://gitlab.server.io
    rbac:
      create: "true"
    concurrent: 10
    runners:
      secret: gitlab-runner-secret
      config: |
        [[runners]]
          [runners.kubernetes]
            privileged = true
            image = "ubuntu:22.04"
    certsSecretName: gitlab-runner-certs