---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: istio
  namespace: istio-system
spec:
  interval: 1h
  url: https://istio-release.storage.googleapis.com/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: base
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
  values:
    defaultRevision: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: istiod
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
  values:
    profile: ambient
    cni:
      enabled: true
    meshConfig:
      extensionProviders:
        - name: "zipkin"
          zipkin:
            service: "jaeger-collector.istio-system.svc.cluster.local"
            port: 9411
        - name: "oauth2-proxy"
          envoyExtAuthzHttp:
            service: "oauth2-proxy.oauth2-proxy.svc.cluster.local"
            port: 80
            includeHeadersInCheck: ["cookie", "authorization"]
            headersToDownstreamOnDeny: ["content-type", "set-cookie"]
            headersToUpstreamOnAllow:
              [
                "x-forwarded-access-token",
                "authorization",
                "path",
                "x-auth-request-user",
                "x-auth-request-email",
                "x-auth-request-access-token",
              ]
      enableTracing: true
