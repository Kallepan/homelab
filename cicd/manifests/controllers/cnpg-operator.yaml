---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-operator
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cnpg
  namespace: cnpg-operator
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-operator
  namespace: cnpg-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.x.x"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-operator
  values:
    replicaCount: 2
