---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jaegertracing
  namespace: observability
spec:
  interval: 1h
  url: https://jaegertracing.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger-operator
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: jaeger-operator
      version: "2.x.x"
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
        namespace: observability
  values:
    rbac:
      create: true
      clusterRole: true
    extraEnv:
      - name: WATCH_NAMESPACE
        value: "istio-system"
    serviceAccount:
      create: true
      name: jaeger-operator
