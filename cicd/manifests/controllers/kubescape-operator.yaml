---
apiVersion: v1
kind: Namespace
metadata:
  name: kubescape-operator
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubescape
  namespace: kubescape-operator
spec:
  interval: 1h
  url: https://kubescape.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape-operator
  namespace: kubescape-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: kubescape-operator
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: kubescape
        namespace: kubescape-operator
  values:
    ksNamespace: kubescape-operator
    clusterName: production
    capabilities:
      continuousScan: enable
    persistence:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size:
        backingStorage: 5Gi
        kubevuln: 2Gi
    kubevulnScheduler:
      scanSchedule: "0 */1 * * *"
