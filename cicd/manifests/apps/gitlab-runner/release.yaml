apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: gitlab-runner
      version: "0.x.x"
      sourceRef:
        kind: HelmRepository
        name: gitlab-charts
        namespace: gitlab
  values:
    certsSecretName: gitlab-ca
    gitlabUrl: https://gitlab.prod.server.home
    rbac:
      create: true
    runners:
      cache:
        secertName: s3-gitlab-cache
      secret: gitlab-runner-token-secret
      config: |
        [[runners]]
          [runners.kubernetes]
            image = "ubuntu:22.04"
