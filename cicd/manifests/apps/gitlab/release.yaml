---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: gitlab
      version: "8.x.x"
      sourceRef:
        kind: HelmRepository
        name: gitlab-charts
        namespace: gitlab
  values:
    certmanager:
      install: false
      installCRDs: false
    gitlab-runner:
      install: false
    gitlab:
      gitlab-shell:
        istio:
          entryPoint: ssh
      toolbox:
        backups:
          objectStorage:
            config:
              secret: gitlab-minio-creds
              key: s3cmd
              bucket: gitlab-backup
              tmpBucket: gitlab-backup-tmp
    global:
      appConfig:
        usernameChangingEnabled: false
        object_store:
          enabled: true
          connection:
            secret: gitlab-minio-connection
            key: connection.yml
        omniauth:
          enabled: true
          autoSignInWithProvider: openid_connect
          allowSingleSignOn:
            - openid_connect
          blockAutoCreatedUsers: true
          providers:
            - secret: gitlab-keycloak-omniauth
              key: omniauth.yml
      certificates:
        customCAs:
          - secret: gitlab-ca
            keys:
              - gitlab.srv-lab.server.home.crt
      gitlab:
        toolbox:
          backups:
            objectStorage:
              config:
                secret: gitlab-minio-connection
                key: connection.yml
      edition: ce
      gitaly:
        enabled: true
        persistence:
          enabled: true
          size: 10Gi
          storageClass: longhorn
      psql:
        serviceName: gitlab-postgres-rw
        port: 5432
        database: gitlab
        username: gitlab
        password:
          useSecret: true
          secret: gitlab-postgres-app
          key: password
      hosts:
        domain: srv-lab.server.home
        externalIP: 10.0.255.0
        gitlab: {}
        hostSuffix: null
        https: true
        kas: {}
        minio: {}
        pages: {}
        registry: {}
        smartcard: {}
        ssh: ~
        tls: {}
      ingress:
        class: istio
        configureCertmanager: false
        enabled: true
        path: /
        pathType: Prefix
        tls:
          enabled: true
          secretName: gitlab-tls-secret
      minio:
        enabled: false
      monitoring:
        enabled: true
      shell:
        port: 2222
      pages:
        enabled: true
      registry:
        enabled: true
      time_zone: Europe/Berlin
    traefik:
      install: false
    postgresql:
      install: false
    prometheus:
      install: false
    redis:
      install: true
      metrics:
        enabled: true
      defaultStorageClass: longhorn
    registry:
      relativeurls: true
    nginx-ingress:
      enabled: false
