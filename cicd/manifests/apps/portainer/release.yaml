---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 1h
  chart:
    spec:
      chart: portainer
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: portainer
  values:
    ingress:
      annotations: {}
      enabled: true
      hosts:
        - host: portainer.prod.server.home
          paths:
            - path: /
              pathType: Prefix
      ingressClassName: "traefik"
      tls:
        - hosts:
            - portainer.prod.server.home
          secretName: portainer-tls
    persistence:
      enabled: true
      size: 2Gi
      storageClass: longhorn-single-replica
      accessMode: ReadWriteOnce
