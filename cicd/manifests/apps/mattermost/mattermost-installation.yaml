apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
  namespace: mattermost
spec:
  size: 100users
  image: mattermost/mattermost-team-edition
  ingress:
    enabled: true
    host: mattermost.prod.server.home
    tlsSecret: mattermost-tls-secret
  database:
    external:
      secret: mattermost-database-secret
  fileStore:
    external:
      url: api.minio.prod.server.home
      bucket: mattermost
      secret: mattermost-minio-creds
